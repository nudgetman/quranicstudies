<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<script>
  // GitHub Pages SPA redirect
  // Store the intended path and redirect to juz-page.html
  (function() {
    var path = window.location.pathname;
    var hash = window.location.hash;
    var basePath = path.includes('/quranicstudies') ? '/quranicstudies' : '';

    // /en/juz25 or /ms/juz25 (with or without .html)
    var langJuzMatch = path.match(/\/(en|ms)\/juz(\d{1,2})(?:\.html)?\/?$/);
    if (langJuzMatch) {
      sessionStorage.setItem('redirect-path', basePath + '/' + langJuzMatch[1] + '/juz' + langJuzMatch[2]);
      window.location.replace(basePath + '/juz-page.html' + hash);
      return;
    }

    // /juz25.html (old static file links) — redirect to /en/juz25
    var bareJuzMatch = path.match(/\/juz(\d{1,2})\.html$/);
    if (bareJuzMatch) {
      sessionStorage.setItem('redirect-path', basePath + '/en/juz' + bareJuzMatch[1]);
      window.location.replace(basePath + '/juz-page.html' + hash);
      return;
    }

    // For other 404s, redirect to home
    window.location.replace(basePath + '/');
  })();
</script>
</head>
<body>
<p style="text-align:center;padding:2rem;font-family:sans-serif;">Redirecting...</p>
</body>
</html>
